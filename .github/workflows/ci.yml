name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.22", "stable"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: Run tests
        run: make test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false
      - name: Lint core
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
      - name: Lint nanoclaw driver
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: drivers/nanoclaw

  build:
    name: Build (cross-compile)
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: Cross-compile core
        run: make build-all
      - name: Cross-compile nanoclaw driver
        working-directory: drivers/nanoclaw
        run: make build-all
