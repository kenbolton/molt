name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Build all platforms
        run: |
          set -e
          mkdir -p build
          for pair in darwin/arm64 darwin/amd64 linux/amd64 linux/arm64; do
            os="${pair%/*}"
            arch="${pair#*/}"
            echo "Building $os/$arch..."
            GOOS=$os GOARCH=$arch go build -o build/molt-${os}-${arch} ./src
            (cd drivers/nanoclaw && GOOS=$os GOARCH=$arch go build -o ../../build/molt-driver-nanoclaw-${os}-${arch} .)
            (cd drivers/zepto && GOOS=$os GOARCH=$arch go build -o ../../build/molt-driver-zepto-${os}-${arch} .)
          done

      - name: Package tarballs
        run: |
          set -e
          cd build
          tag="${GITHUB_REF_NAME}"
          for pair in darwin-arm64 darwin-amd64 linux-amd64 linux-arm64; do
            os="${pair%-*}"
            arch="${pair#*-}"
            dir="molt-${tag}-${os}-${arch}"
            mkdir "$dir"
            cp "molt-${os}-${arch}" "$dir/molt"
            cp "molt-driver-nanoclaw-${os}-${arch}" "$dir/molt-driver-nanoclaw"
            cp "molt-driver-zepto-${os}-${arch}" "$dir/molt-driver-zepto"
            tar czf "${dir}.tar.gz" "$dir"
            rm -rf "$dir"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: build/molt-*.tar.gz
